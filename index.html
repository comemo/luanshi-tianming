<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>亂世殺局 Ultimate v0.2</title>
<style>
:root{
  --bg:#101319;--panel:#202733;--panel2:#2b3443;--gold:#d6a84f;--red:#8e1515;--green:#2db36f;
  --text:#f4efe7;--muted:#b8bdc7;--blue:#3e7ee8;--danger:#d94a4a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",Arial,sans-serif}
.game{height:100dvh;display:grid;grid-template-rows:52px 185px 96px 118px 1fr 64px;gap:7px;padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);max-width:520px;margin:auto}
.topbar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,#7b1111,#b9862d);border-radius:0 0 16px 16px;padding:8px 12px}
.title{font-weight:900;font-size:20px;letter-spacing:.5px}
.badge{font-size:12px;background:#1119;padding:5px 8px;border-radius:999px}
.table{display:grid;grid-template-rows:92px 86px;gap:7px}
.enemy-main{display:flex;justify-content:center}
.side-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hero{background:var(--panel);border:1px solid #ffffff18;border-radius:18px;padding:8px;position:relative;box-shadow:0 4px 12px #0005}
.hero.dead{opacity:.4;filter:grayscale(1)}
.role{position:absolute;top:7px;right:7px;font-size:11px;padding:3px 6px;border-radius:999px;background:#0008;color:#fff}
.avatar{font-size:26px;line-height:1}
.name{font-weight:900;font-size:18px;margin-top:2px}
.sub{color:var(--muted);font-size:12px;margin-top:1px}
.hp{font-size:16px;letter-spacing:1px;margin-top:3px}
.handcount{position:absolute;bottom:7px;right:8px;color:#ddd;font-size:12px}
.battle{background:#151922;border:1px solid #ffffff12;border-radius:16px;padding:8px;overflow:hidden}
.battle-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.phase{color:var(--gold);font-weight:900}
.log{font-size:13px;line-height:1.35;height:58px;overflow:auto;color:#e9e1d6}
.player{background:linear-gradient(180deg,#293345,#1d2531);border:2px solid var(--gold);border-radius:18px;padding:10px;display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center}
.player .avatar{font-size:38px}.skill{font-size:12px;color:#ffe0a0}.status{text-align:right;font-size:12px;color:#d7d7d7}
.hand{display:flex;gap:9px;overflow-x:auto;overflow-y:hidden;padding:2px 1px 6px;align-items:stretch}
.card{min-width:94px;max-width:94px;background:linear-gradient(180deg,#f5db9c,#c38a32);color:#261508;border:2px solid #fff5;border-radius:14px;padding:8px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 5px 10px #0008}
.card .ct{font-weight:900;font-size:19px}.card .cd{font-size:11px;line-height:1.2}.card.attack{background:linear-gradient(180deg,#ffb0a0,#b63828);color:white}.card.def{background:linear-gradient(180deg,#b9d3ff,#376cc8);color:white}.card.heal{background:linear-gradient(180deg,#b7f7cf,#2c9b5b);color:white}.card.tactic{background:linear-gradient(180deg,#eac0ff,#7940a9);color:white}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button{border:0;border-radius:14px;font-weight:900;font-size:15px;padding:10px;color:white;background:#3b4656}
button.primary{background:var(--red)}button.gold{background:#b78328}button.green{background:var(--green)}
.overlay{position:fixed;inset:0;background:#080a0ecc;display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}
.modal{background:#202733;border:1px solid #ffffff25;border-radius:22px;padding:18px;max-width:460px;width:100%;box-shadow:0 20px 60px #000}
.modal h1{margin:0 0 8px;font-size:28px}.modal p{color:#d6d6d6;line-height:1.5}.pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.pick button{background:#2f3a4c;text-align:left}.hidden{display:none}
.small{font-size:12px;color:#aaa}.win{color:#ffe69a}.lose{color:#ff9a9a}
</style>
</head>
<body>
<div class="game">
  <div class="topbar"><div class="title">亂世殺局 Ultimate</div><div class="badge" id="round">第 1 回合</div></div>
  <div class="table">
    <div class="enemy-main"><div class="hero" id="p1"></div></div>
    <div class="side-row"><div class="hero" id="p2"></div><div class="hero" id="p3"></div></div>
  </div>
  <div class="battle">
    <div class="battle-head"><div class="phase" id="phase">你的出牌階段</div><div class="small" id="identityTip"></div></div>
    <div class="log" id="log"></div>
  </div>
  <div class="player" id="playerBox"></div>
  <div class="hand" id="hand"></div>
  <div class="actions">
    <button class="gold" onclick="drawCard()">摸牌</button>
    <button class="primary" onclick="endTurn()">結束回合</button>
    <button class="green" onclick="newGame()">新局</button>
  </div>
</div>

<div class="overlay" id="start">
  <div class="modal">
    <h1>亂世殺局 Ultimate v0.2</h1>
    <p>四人身份局原型：你會隨機成為君主、輔臣、叛軍或梟雄。每局武將、身份與局勢都不同。</p>
    <div class="pick">
      <button onclick="startGame()">開始亂世</button>
      <button onclick="showRules()">規則簡介</button>
    </div>
    <div class="small">手機直向設計：武將、戰場、手牌全部固定在一屏內。</div>
  </div>
</div>

<script>
const generals=[
["劉備","蜀","🟢","仁德：回春額外+1"],["關羽","蜀","🧔","武聖：攻擊傷害+1"],["張飛","蜀","😠","咆哮：可連續攻擊"],["趙雲","蜀","🛡️","龍膽：受攻擊時有機會反擊"],
["諸葛亮","蜀","🪶","觀星：每回合多摸1張"],["馬超","蜀","🐎","鐵騎：攻擊不可完全防禦"],["黃忠","蜀","🏹","烈弓：殘血時攻擊+1"],["姜維","蜀","📜","挑釁：敵人更易攻擊你"],
["曹操","魏","👑","奸雄：受傷後摸1張"],["司馬懿","魏","🧠","鬼才：錦囊傷害+1"],["張遼","魏","⚔️","突襲：攻擊時棄敵手牌"],["夏侯惇","魏","🩸","剛烈：受傷反傷"],
["郭嘉","魏","📘","遺計：受傷後摸2張"],["荀彧","魏","📚","王佐：可治療盟友"],["許褚","魏","💪","裸衣：攻擊高但易受傷"],["典韋","魏","🪓","惡來：瀕死時爆發"],
["孫權","吳","🔵","制衡：可換手牌"],["周瑜","吳","🔥","英姿：每回合多摸1張"],["陸遜","吳","🌊","連營：空手牌時補牌"],["呂蒙","吳","🧩","克己：可蓄力"],
["甘寧","吳","🏴","奇襲：破壞敵方防禦"],["孫尚香","吳","🌸","梟姬：裝備時摸牌"],["黃蓋","吳","🚢","苦肉：自傷換爆發"],["太史慈","吳","🎯","天義：攻擊命中率高"],
["呂布","群","🐺","無雙：攻擊傷害+2"],["貂蟬","群","💃","離間：令敵方互鬥"],["董卓","群","🍖","暴虐：高血量低防禦"],["袁紹","群","🏯","亂箭：群體攻擊"],
["張角","群","⚡","雷擊：錦囊爆發"],["華雄","群","🗡️","猛將：前期攻擊強"],["陳宮","群","🕯️","明策：強化盟友"],["高順","群","🚩","陷陣：攻擊穿透"]
];
const roles=["君主","輔臣","叛軍","梟雄"];
const deckBase=[
{name:"攻擊",type:"attack",desc:"對一名敵人造成1傷害"},
{name:"重擊",type:"attack",desc:"造成2傷害"},
{name:"防禦",type:"def",desc:"抵消一次攻擊"},
{name:"回春",type:"heal",desc:"回復1點體力"},
{name:"火計",type:"tactic",desc:"造成2點計謀傷害"},
{name:"破甲",type:"tactic",desc:"造成1傷害並棄敵一牌"},
{name:"無中生有",type:"tactic",desc:"摸2張牌"},
{name:"奇襲",type:"tactic",desc:"隨機攻擊一名敵人"}
];
let players=[],me=0,hand=[],round=1,gameOver=false;

function rnd(n){return Math.floor(Math.random()*n)}
function sample(arr){return arr[rnd(arr.length)]}
function makePlayer(i,role){
 let g=sample(generals);
 let hp=role==="君主"?5:4;
 return {i,role,name:g[0],faction:g[1],icon:g[2],skill:g[3],hp,max:hp,cards:3,alive:true};
}
function log(t){const el=document.getElementById("log");el.innerHTML="• "+t+"<br>"+el.innerHTML}
function startGame(){
 document.getElementById("start").classList.add("hidden");
 newGame();
}
function showRules(){
 alert("身份勝利：君主/輔臣要消滅叛軍與梟雄；叛軍要擊敗君主；梟雄要成為最後生還者。點手牌即可使用，攻擊會自動選擇敵對目標。");
}
function newGame(){
 gameOver=false;round=1;hand=[];
 let shuffled=[...roles].sort(()=>Math.random()-0.5);
 players=[0,1,2,3].map(i=>makePlayer(i,shuffled[i]));
 for(let i=0;i<4;i++)drawCard(false);
 log("新局開始：你是「"+players[me].role+"」，武將為「"+players[me].name+"」。");
 render();
}
function drawCard(show=true){
 if(gameOver)return;
 let c=sample(deckBase);hand.push({...c});
 if(players[me].name==="諸葛亮"||players[me].name==="周瑜"){ if(Math.random()<.35) hand.push({...sample(deckBase)}); }
 if(show)log("你摸到【"+c.name+"】。");
 render();
}
function isEnemy(a,b){
 if(!a.alive||!b.alive)return false;
 if(a.role==="君主"||a.role==="輔臣")return b.role==="叛軍"||b.role==="梟雄";
 if(a.role==="叛軍")return b.role==="君主"||b.role==="輔臣";
 if(a.role==="梟雄")return true;
}
function targetsFor(p){return players.filter(x=>x.i!==p.i&&isEnemy(p,x)&&x.alive)}
function chooseTarget(p){let ts=targetsFor(p); if(!ts.length)ts=players.filter(x=>x.i!==p.i&&x.alive); return ts[rnd(ts.length)]}
function damage(target,amount,source){
 if(!target||!target.alive)return;
 target.hp-=amount;
 log((source?source.name:"你")+" 對 "+target.name+" 造成 "+amount+" 傷害。");
 if(target.name==="曹操"||target.name==="郭嘉"){target.cards++;log(target.name+" 發動受傷摸牌。")}
 if(target.name==="夏侯惇"&&source&&source.alive){source.hp-=1;log(target.name+" 剛烈反傷 "+source.name+"。")}
 if(target.hp<=0){target.alive=false;target.hp=0;log("【"+target.name+"】退場。");}
 checkWin();
}
function playCard(idx){
 if(gameOver)return;
 let c=hand[idx]; let p=players[me]; let t=chooseTarget(p);
 if(c.type==="attack"){
   let dmg=c.name==="重擊"?2:1;
   if(p.name==="關羽")dmg++;
   if(p.name==="呂布")dmg+=2;
   damage(t,dmg,p);
 }
 if(c.type==="heal"){
   let heal=p.name==="劉備"?2:1;
   p.hp=Math.min(p.max,p.hp+heal);log("你使用【回春】，回復 "+heal+" 點。");
 }
 if(c.name==="火計"){
   let dmg=p.name==="司馬懿"||p.name==="張角"?3:2;damage(t,dmg,p);
 }
 if(c.name==="破甲"){
   damage(t,1,p); if(t.cards>0)t.cards--; log(t.name+" 被棄置1張牌。");
 }
 if(c.name==="無中生有"){drawCard(false);drawCard(false);log("你使用【無中生有】，摸2張。");}
 if(c.name==="奇襲"){damage(t,1,p);}
 hand.splice(idx,1);render();
}
function aiAct(ai){
 if(!ai.alive)return;
 if(ai.hp<=2&&Math.random()<.45){ai.hp=Math.min(ai.max,ai.hp+1);log(ai.name+" 使用回春。");return;}
 let t=chooseTarget(ai); if(!t)return;
 let dmg=1;
 if(ai.name==="呂布")dmg=2;
 if(ai.name==="袁紹"&&Math.random()<.35){
   log(ai.name+" 發動亂箭。");
   players.forEach(x=>{if(x.i!==ai.i&&x.alive)damage(x,1,ai)});
   return;
 }
 damage(t,dmg,ai);
}
function endTurn(){
 if(gameOver)return;
 document.getElementById("phase").textContent="敵方行動中";
 for(let i=1;i<4;i++)aiAct(players[i]);
 round++; drawCard(false); drawCard(false);
 log("進入第 "+round+" 回合。");
 document.getElementById("phase").textContent="你的出牌階段";
 render();
}
function checkWin(){
 let p=players[me];
 if(!p.alive){gameOver=true;log("<span class='lose'>你已退場，亂世無情。</span>");}
 let alive=players.filter(x=>x.alive);
 let lord=players.find(x=>x.role==="君主");
 if(lord&&!lord.alive){
   if(p.role==="叛軍"){gameOver=true;log("<span class='win'>叛軍勝利！</span>");}
   else if(p.role==="梟雄"&&alive.length===1&&alive[0].i===me){gameOver=true;log("<span class='win'>梟雄獨勝！</span>");}
   else {gameOver=true;log("<span class='lose'>君主敗亡，天下崩裂。</span>");}
 }
 let bad=players.filter(x=>x.alive&&(x.role==="叛軍"||x.role==="梟雄"));
 if(bad.length===0 && (p.role==="君主"||p.role==="輔臣")){gameOver=true;log("<span class='win'>王道勝利！</span>");}
}
function heroHTML(p,main=false){
 let hearts="❤️".repeat(p.hp)+"🖤".repeat(Math.max(0,p.max-p.hp));
 return `<div class="role">${p.role}</div><div class="avatar">${p.icon}</div><div class="name">${p.name}</div><div class="sub">${p.faction}｜${p.skill.split("：")[0]}</div><div class="hp">${hearts}</div><div class="handcount">手牌 ${p.cards}</div>`;
}
function render(){
 document.getElementById("round").textContent="第 "+round+" 回合";
 for(let i=1;i<4;i++){let el=document.getElementById("p"+i);el.innerHTML=heroHTML(players[i]);el.className="hero"+(players[i].alive?"":" dead");}
 let p=players[me];document.getElementById("playerBox").innerHTML=`<div class="avatar">${p.icon}</div><div><div class="name">你：${p.name}</div><div class="sub">${p.faction}｜身份：${p.role}</div><div class="skill">【${p.skill}】</div></div><div class="status"><div>${"❤️".repeat(p.hp)}</div><div>手牌 ${hand.length}</div></div>`;
 document.getElementById("identityTip").textContent="目標："+(p.role==="君主"||p.role==="輔臣"?"清除叛軍與梟雄":p.role==="叛軍"?"擊敗君主":"最後存活");
 let h=document.getElementById("hand");h.innerHTML="";
 hand.forEach((c,i)=>{let b=document.createElement("div");b.className="card "+(c.type==="attack"?"attack":c.type==="def"?"def":c.type==="heal"?"heal":"tactic");b.onclick=()=>playCard(i);b.innerHTML=`<div class="ct">${c.name}</div><div class="cd">${c.desc}</div>`;h.appendChild(b);});
}
</script>
</body>
</html>
